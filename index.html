<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>产品卡片生成器</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,700;0,900;1,700&family=Barlow:wght@300;400;500&family=Noto+Serif+SC:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
/* ─────────────────────────────
   RESET & BASE
───────────────────────────── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --panel-bg: #F2F2F2;
  --sidebar-bg: #1A1A1A;
  --sidebar-text: #E0E0E0;
  --input-bg: #252525;
  --input-border: #383838;
  --input-focus: #666;
  --label-color: #666;
  --section-border: #2E2E2E;
  --accent-ui: #888;
}
body {
  background: var(--panel-bg);
  font-family: 'Barlow', sans-serif;
  font-weight: 400;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  color: var(--sidebar-text);
}

/* ─────────────────────────────
   TOP BAR
───────────────────────────── */
.topbar {
  background: #111;
  height: 48px;
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 20px;
  flex-shrink: 0;
  border-bottom: 1px solid #000;
}
.topbar-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: #DDD;
}
.topbar-sep { width: 1px; height: 16px; background: #333; }
.topbar-sub {
  font-size: 11px;
  color: #555;
  letter-spacing: .06em;
}

/* ─────────────────────────────
   WORKSPACE
───────────────────────────── */
.workspace {
  display: grid;
  grid-template-columns: 300px 1fr;
  flex: 1;
  height: calc(100vh - 48px);
  overflow: hidden;
}

/* ─────────────────────────────
   SIDEBAR
───────────────────────────── */
.sidebar {
  background: var(--sidebar-bg);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  overflow-x: hidden;
}
.sidebar::-webkit-scrollbar { width: 3px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: #333; }

.sb-section {
  padding: 16px 16px;
  border-bottom: 1px solid var(--section-border);
}
.sb-section:last-child { border-bottom: none; }

.sb-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: var(--label-color);
  margin-bottom: 10px;
  display: block;
}

/* ─── Upload ─── */
.upload-area {
  border: 1.5px dashed #333;
  background: #222;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: border-color .15s;
  height: 130px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.upload-area:hover { border-color: #666; }
.upload-area.has-img { padding: 0; }
.upload-area.has-img img { width:100%; height:100%; object-fit:cover; display:block; }
.upload-area input[type=file] { display: none; }
.upload-area svg { opacity: .25; }
.upload-hint { font-size: 11px; color: #555; }
.upload-btn {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: #888;
  border: 1px solid #383838;
  background: none;
  padding: 4px 12px;
  cursor: pointer;
  font-family: 'Barlow', sans-serif;
  transition: all .15s;
}
.upload-btn:hover { border-color: #888; color: #CCC; }
.upload-overlay {
  position: absolute; inset: 0;
  background: rgba(0,0,0,.65);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity .15s;
  font-size: 11px; color: white; letter-spacing: .08em;
  gap: 6px;
}
.upload-area.has-img:hover .upload-overlay { opacity: 1; }

/* ─── Text inputs ─── */
.fields-grid {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.field { display: flex; flex-direction: column; gap: 3px; }
.field-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: #555;
}
.field input, .field textarea {
  background: var(--input-bg);
  border: 1px solid var(--input-border);
  color: #CCC;
  font-family: 'Barlow', sans-serif;
  font-size: 12px;
  padding: 6px 9px;
  outline: none;
  transition: border-color .15s;
  width: 100%;
}
.field input:focus, .field textarea:focus { border-color: var(--input-focus); color: #EEE; }
.field input::placeholder, .field textarea::placeholder { color: #3A3A3A; }
.field textarea { resize: none; height: 56px; line-height: 1.55; }

/* ─── Color controls ─── */
/* 3 separate rows, each clearly labelled */
.color-controls { display: flex; flex-direction: column; gap: 12px; }

.color-row {}
.color-row-title {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: #555;
  margin-bottom: 6px;
}
.swatches {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
  align-items: center;
  margin-bottom: 5px;
}
.swatch {
  width: 20px; height: 20px;
  border-radius: 50%;
  cursor: pointer;
  border: 1.5px solid transparent;
  transition: transform .1s, border-color .1s;
  flex-shrink: 0;
}
.swatch:hover { transform: scale(1.2); }
.swatch.on { border-color: #FFF; }
.swatch.on-dark { border-color: #444; }  /* for white swatch active */

.color-custom {
  display: flex;
  align-items: center;
  gap: 7px;
}
.color-custom input[type=color] {
  width: 24px; height: 20px;
  border: 1px solid #383838;
  padding: 1px;
  background: #222;
  cursor: pointer;
}
.color-hex {
  font-size: 10px;
  color: #555;
  font-family: monospace;
  letter-spacing: .04em;
}

/* ─── Layout selector ─── */
.layout-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}
.layout-opt {
  background: #222;
  border: 1.5px solid #333;
  padding: 8px 6px 7px;
  text-align: center;
  cursor: pointer;
  transition: all .12s;
}
.layout-opt:hover { border-color: #666; }
.layout-opt.active { border-color: #EEE; background: #EEE; }
.layout-opt .lo-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: #AAA;
}
.layout-opt.active .lo-name { color: #111; }
.layout-opt .lo-tag {
  font-size: 9px;
  color: #444;
  margin-top: 1px;
}
.layout-opt.active .lo-tag { color: #666; }

/* ─── Export buttons ─── */
.export-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 7px;
}
.btn-export {
  background: #EEE;
  color: #111;
  border: none;
  padding: 10px 6px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all .15s;
}
.btn-export:hover { background: #FFF; }
.btn-export.secondary {
  background: #252525;
  color: #888;
  border: 1px solid #333;
}
.btn-export.secondary:hover { background: #2E2E2E; color: #CCC; border-color: #666; }

/* ─────────────────────────────
   PREVIEW AREA
───────────────────────────── */
.preview-area {
  background: #CBCBCB;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: auto;
  padding: 32px;
  background-image: 
    linear-gradient(rgba(0,0,0,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,0,0,.04) 1px, transparent 1px);
  background-size: 24px 24px;
}

/* ─────────────────────────────
   THE CARD  (450 × 600)
   All colors via JS-set CSS vars
───────────────────────────── */
#card {
  width: 450px;
  height: 600px;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
  font-family: 'Barlow', sans-serif;
  /* these vars are set by JS */
  --c-bg: #FFFFFF;
  --c-accent: #111111;
  --c-text: #111111;
  --c-text-sub: rgba(17,17,17,0.55);
  --c-text-faint: rgba(17,17,17,0.32);
  --c-on-accent: #FFFFFF;
}

/* ── Shared card primitives ── */
.card-img-block {
  width: 100%; height: 100%;
  background: #EEEEEE;
  overflow: hidden;
}
.card-img-block img {
  width: 100%; height: 100%;
  object-fit: cover; display: block;
}
.card-img-block.empty {
  display: flex; align-items: center; justify-content: center;
  color: #CCC; font-size: 11px; letter-spacing: .1em;
}
.card-divider-h { width: 100%; height: 1px; background: rgba(0,0,0,.09); }
.card-divider-v { width: 1px; background: rgba(0,0,0,.09); align-self: stretch; }

/* ══════════════════════════════
   LAYOUT A — Classic
   [accent strip | image]
   [name | desc | price+size]
══════════════════════════════ */
#card.layout-a {
  background: var(--c-bg);
  display: grid;
  grid-template-columns: 120px 1fr;
  grid-template-rows: 1fr 148px;
  border: 1px solid rgba(0,0,0,.1);
}
.la-strip {
  grid-row: 1; grid-column: 1;
  background: var(--c-accent);
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 0 0 18px 14px;
  border-right: 1px solid rgba(0,0,0,.08);
  overflow: hidden;
}
.la-watermark {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: 52px;
  line-height: .85;
  letter-spacing: -2px;
  writing-mode: vertical-rl;
  transform: rotate(180deg);
  color: var(--c-on-accent);
  opacity: .12;
  user-select: none;
}
.la-img {
  grid-row: 1; grid-column: 2;
}
.la-bottom {
  grid-column: 1 / -1;
  border-top: 1px solid rgba(0,0,0,.08);
  display: grid;
  grid-template-columns: 120px 1fr 120px;
}
.la-cell {
  padding: 14px 14px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 3px;
}
.la-cell + .la-cell { border-left: 1px solid rgba(0,0,0,.08); }
.la-cell-label {
  font-size: 7.5px;
  font-weight: 700;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--c-text-faint);
  margin-bottom: 2px;
}

/* ══════════════════════════════
   LAYOUT B — Header Big
   [brand header]
   [image | info]
   [footer bar]
══════════════════════════════ */
#card.layout-b {
  background: var(--c-bg);
  display: flex;
  flex-direction: column;
  border: 1px solid rgba(0,0,0,.1);
}
.lb-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid rgba(0,0,0,.08);
  flex-shrink: 0;
  gap: 12px;
}
.lb-body {
  display: grid;
  grid-template-columns: 1fr 1fr;
  flex: 1;
  min-height: 0;
}
.lb-img { border-right: 1px solid rgba(0,0,0,.08); }
.lb-info {
  padding: 18px 16px;
  display: flex;
  flex-direction: column;
  gap: 13px;
  overflow: hidden;
}
.lb-info-label {
  font-size: 7.5px;
  font-weight: 700;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--c-text-faint);
  margin-bottom: 3px;
}
.lb-footer {
  border-top: 1px solid rgba(0,0,0,.08);
  padding: 9px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

/* ══════════════════════════════
   LAYOUT C — Full Bleed
   [image fills top]
   [accent line]
   [name + price row]
   [desc + size row]
══════════════════════════════ */
#card.layout-c {
  background: var(--c-bg);
  display: flex;
  flex-direction: column;
  border: 1px solid rgba(0,0,0,.1);
}
.lc-img { flex: 1; min-height: 0; position: relative; }
.lc-cat-tag {
  position: absolute;
  top: 14px; left: 14px;
  background: var(--c-accent);
  color: var(--c-on-accent);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 9px; font-weight: 700;
  letter-spacing: .18em; text-transform: uppercase;
  padding: 4px 10px;
}
.lc-accent-line {
  height: 3px;
  background: var(--c-accent);
  flex-shrink: 0;
}
.lc-name-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  padding: 14px 20px 10px;
  border-bottom: 1px solid rgba(0,0,0,.07);
  flex-shrink: 0;
  gap: 12px;
}
.lc-bottom {
  display: flex;
  flex-shrink: 0;
}
.lc-desc-cell { flex: 1; padding: 12px 20px; }
.lc-size-cell {
  width: 120px;
  padding: 12px 16px;
  border-left: 1px solid rgba(0,0,0,.08);
  flex-shrink: 0;
}
.lc-size-label {
  font-size: 7.5px; font-weight: 700;
  letter-spacing: .18em; text-transform: uppercase;
  color: var(--c-text-faint);
  margin-bottom: 4px;
}

/* ══════════════════════════════
   LAYOUT D — Grid 3-col
   [accent | image | info]
   [brand | desc | web]
══════════════════════════════ */
#card.layout-d {
  background: var(--c-bg);
  display: grid;
  grid-template-columns: 80px 1fr 110px;
  grid-template-rows: 1fr 120px;
  border: 1px solid rgba(0,0,0,.1);
}
.ld-strip {
  grid-row: 1; grid-column: 1;
  background: var(--c-accent);
  display: flex; flex-direction: column;
  justify-content: space-between;
  padding: 16px 10px;
  overflow: hidden;
}
.ld-watermark {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900; font-size: 60px;
  line-height: .82; letter-spacing: -3px;
  writing-mode: vertical-rl; transform: rotate(180deg);
  color: var(--c-on-accent); opacity: .12;
  user-select: none; overflow: hidden;
}
.ld-no {
  font-size: 8px; color: var(--c-on-accent); opacity: .3;
  letter-spacing: .1em;
}
.ld-img {
  grid-row: 1; grid-column: 2;
  border-left: 1px solid rgba(0,0,0,.07);
}
.ld-info {
  grid-row: 1; grid-column: 3;
  border-left: 1px solid rgba(0,0,0,.08);
  padding: 16px 12px;
  display: flex; flex-direction: column; gap: 10px;
}
.ld-info-label {
  font-size: 7.5px; font-weight: 700;
  letter-spacing: .18em; text-transform: uppercase;
  color: var(--c-text-faint);
}
.ld-footer {
  grid-column: 1 / -1;
  border-top: 1px solid rgba(0,0,0,.08);
  display: flex;
}
.ld-foot-cell {
  flex: 1; padding: 12px 12px;
  display: flex; flex-direction: column; gap: 3px;
}
.ld-foot-cell + .ld-foot-cell { border-left: 1px solid rgba(0,0,0,.08); }
.ld-foot-label {
  font-size: 7.5px; font-weight: 700;
  letter-spacing: .2em; text-transform: uppercase;
  color: var(--c-text-faint);
}

/* ── Text classes (color from var) ── */
.t-brand {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 38px; font-weight: 900; line-height: 1;
  letter-spacing: -.5px;
  color: var(--c-text);
}
.t-price {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 34px; font-weight: 900; line-height: 1;
  white-space: nowrap;
  color: var(--c-text);
}
.t-price-sm {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 26px; font-weight: 900; line-height: 1;
  white-space: nowrap;
  color: var(--c-text);
}
.t-name-cn {
  font-family: 'Noto Serif SC', sans-serif;
  font-size: 18px; font-weight: 400; line-height: 1.2;
  color: var(--c-text);
}
.t-name-cn-sm {
  font-family: 'Noto Serif SC', sans-serif;
  font-size: 14px; font-weight: 400; line-height: 1.3;
  color: var(--c-text);
}
.t-name-en {
  font-size: 11px; font-style: italic;
  color: var(--c-text-sub);
  margin-top: 2px;
}
.t-name-en-sm {
  font-size: 9px; font-style: italic;
  color: var(--c-text-sub);
  margin-top: 1px;
}
.t-desc {
  font-size: 10px; line-height: 1.8;
  color: var(--c-text-sub);
}
.t-size {
  font-size: 10px; line-height: 1.85;
  color: var(--c-text-sub);
}
.t-cat {
  font-size: 8px; font-weight: 700;
  letter-spacing: .18em; text-transform: uppercase;
  color: var(--c-text-faint);
}
.t-web {
  font-size: 8px; letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--c-text-faint);
}

/* ─────────────────────────────
   TOAST
───────────────────────────── */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: #EEE; color: #111;
  padding: 9px 22px; font-size: 12px; letter-spacing: .06em;
  opacity: 0; transition: opacity .2s; pointer-events: none; z-index: 999;
  font-weight: 500;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-title">Card Maker</span>
  <div class="topbar-sep"></div>
  <span class="topbar-sub">产品卡片生成器 · 450 × 600</span>
</div>

<div class="workspace">

  <!-- ══ SIDEBAR ══ -->
  <div class="sidebar">

    <!-- Image -->
    <div class="sb-section">
      <span class="sb-label">产品图片</span>
      <div class="upload-area" id="uploadArea" onclick="document.getElementById('imgFile').click()">
        <input type="file" id="imgFile" accept="image/*" onchange="onImgSelect(event)">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none" stroke="#555" stroke-width="1.2">
          <rect x="1" y="3" width="26" height="22" rx="1.5"/>
          <circle cx="9" cy="11" r="2.5"/>
          <path d="M1 22l7-7 5 5 5-6 9 8"/>
        </svg>
        <span class="upload-hint">点击或拖拽图片</span>
        <button class="upload-btn" onclick="event.stopPropagation()">选择图片</button>
        <div class="upload-overlay">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="white" stroke-width="1.5"><path d="M7 1v12M1 7l6-6 6 6"/></svg>
          更换图片
        </div>
      </div>
    </div>

    <!-- Fields -->
    <div class="sb-section">
      <span class="sb-label">产品信息</span>
      <div class="fields-grid">
        <div class="field-row">
          <div class="field">
            <span class="field-label">品牌</span>
            <input id="f-brand" type="text" placeholder="BRAND" oninput="render()">
          </div>
          <div class="field">
            <span class="field-label">类别</span>
            <input id="f-cat" type="text" placeholder="Furniture" oninput="render()">
          </div>
        </div>
        <div class="field">
          <span class="field-label">中文名称</span>
          <input id="f-name-cn" type="text" placeholder="产品名称" oninput="render()">
        </div>
        <div class="field">
          <span class="field-label">English Name</span>
          <input id="f-name-en" type="text" placeholder="Product Name" oninput="render()">
        </div>
        <div class="field">
          <span class="field-label">产品介绍</span>
          <textarea id="f-desc" placeholder="材质、工艺、风格描述..." oninput="render()"></textarea>
        </div>
        <div class="field-row">
          <div class="field">
            <span class="field-label">尺寸规格</span>
            <input id="f-size" type="text" placeholder="W50×D50×H55" oninput="render()">
          </div>
          <div class="field">
            <span class="field-label">价格</span>
            <input id="f-price" type="text" placeholder="¥3,800" oninput="render()">
          </div>
        </div>
      </div>
    </div>

    <!-- Colors — 3 completely separate controls -->
    <div class="sb-section">
      <span class="sb-label">颜色</span>
      <div class="color-controls">

        <!-- 1. Card background -->
        <div class="color-row">
          <div class="color-row-title">卡片底色</div>
          <div class="swatches" id="sw-bg"></div>
          <div class="color-custom">
            <input type="color" id="cp-bg" value="#FFFFFF" oninput="setColor('bg', this.value)">
            <span class="color-hex" id="hex-bg">#FFFFFF</span>
          </div>
        </div>

        <!-- 2. Accent / decorative color -->
        <div class="color-row">
          <div class="color-row-title">主题色 · 色块 / 标签 / 装饰线</div>
          <div class="swatches" id="sw-accent"></div>
          <div class="color-custom">
            <input type="color" id="cp-accent" value="#111111" oninput="setColor('accent', this.value)">
            <span class="color-hex" id="hex-accent">#111111</span>
          </div>
        </div>

        <!-- 3. Text color -->
        <div class="color-row">
          <div class="color-row-title">文字色 · 所有文字</div>
          <div class="swatches" id="sw-text"></div>
          <div class="color-custom">
            <input type="color" id="cp-text" value="#111111" oninput="setColor('text', this.value)">
            <span class="color-hex" id="hex-text">#111111</span>
          </div>
        </div>

      </div>
    </div>

    <!-- Layout -->
    <div class="sb-section">
      <span class="sb-label">版式</span>
      <div class="layout-grid">
        <div class="layout-opt active" id="lo-a" onclick="setLayout('a')">
          <div class="lo-name">Classic</div>
          <div class="lo-tag">色条 + 底栏</div>
        </div>
        <div class="layout-opt" id="lo-b" onclick="setLayout('b')">
          <div class="lo-name">Header</div>
          <div class="lo-tag">大标题头部</div>
        </div>
        <div class="layout-opt" id="lo-c" onclick="setLayout('c')">
          <div class="lo-name">Bleed</div>
          <div class="lo-tag">满版大图</div>
        </div>
        <div class="layout-opt" id="lo-d" onclick="setLayout('d')">
          <div class="lo-name">Grid</div>
          <div class="lo-tag">三栏网格</div>
        </div>
      </div>
    </div>

    <!-- Export -->
    <div class="sb-section">
      <span class="sb-label">导出</span>
      <div class="export-row">
        <button class="btn-export" onclick="exportCard('png')">PNG</button>
        <button class="btn-export secondary" onclick="exportCard('jpg')">JPEG</button>
      </div>
    </div>

  </div><!-- /sidebar -->

  <!-- ══ PREVIEW ══ -->
  <div class="preview-area">
    <div id="card" class="layout-a"></div>
  </div>

</div><!-- /workspace -->

<div class="toast" id="toast"></div>

<script>
// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
const state = {
  img: null,
  layout: 'a',
  colors: {
    bg:     '#FFFFFF',
    accent: '#111111',
    text:   '#111111',
  }
};

// Preset swatches per role
const SW = {
  bg:     ['#FFFFFF','#F7F4EF','#1A1A1A','#111111','#F0EBE1','#EEF0F2','#1E1810','#2C2820'],
  accent: ['#111111','#8B6914','#2D4A3E','#1B3A6B','#8B2020','#5B4A3A','#C4A882','#4A6741'],
  text:   ['#111111','#333333','#666666','#FFFFFF','#8B6914','#2D4A3E','#1B3A6B','#8B2020'],
};

// ─────────────────────────────────────────────
//  INIT SWATCHES
// ─────────────────────────────────────────────
function initSwatches() {
  ['bg','accent','text'].forEach(role => {
    const container = document.getElementById('sw-' + role);
    SW[role].forEach(hex => {
      const el = document.createElement('div');
      el.className = 'swatch';
      el.style.background = hex;
      // white swatch gets dark border
      if (hex === '#FFFFFF' || hex === '#F7F4EF' || hex === '#EEF0F2' || hex === '#F0EBE1') {
        el.style.border = '1.5px solid #444';
      }
      if (hex.toLowerCase() === state.colors[role].toLowerCase()) el.classList.add('on');
      el.onclick = () => setColor(role, hex);
      container.appendChild(el);
    });
  });
}

// ─────────────────────────────────────────────
//  SET COLOR  (single function, role-based)
// ─────────────────────────────────────────────
function setColor(role, hex) {
  state.colors[role] = hex;
  // sync picker + hex display
  document.getElementById('cp-' + role).value = hex;
  document.getElementById('hex-' + role).textContent = hex.toUpperCase();
  // refresh swatches active state
  const container = document.getElementById('sw-' + role);
  container.querySelectorAll('.swatch').forEach(s => {
    s.classList.toggle('on', s.style.background === hexToRgb(hex) || s.style.background.toLowerCase() === hex.toLowerCase());
  });
  applyColors();
  render();
}

function applyColors() {
  const card = document.getElementById('card');
  const { bg, accent, text } = state.colors;
  card.style.setProperty('--c-bg', bg);
  card.style.setProperty('--c-accent', accent);
  card.style.setProperty('--c-text', text);
  // derive sub-colors from text
  const [r,g,b] = hexToComponents(text);
  card.style.setProperty('--c-text-sub',   `rgba(${r},${g},${b},0.55)`);
  card.style.setProperty('--c-text-faint', `rgba(${r},${g},${b},0.32)`);
  // on-accent: readable color on top of accent bg
  card.style.setProperty('--c-on-accent', isLight(accent) ? '#111111' : '#FFFFFF');
}

// ─────────────────────────────────────────────
//  LAYOUT
// ─────────────────────────────────────────────
function setLayout(l) {
  state.layout = l;
  ['a','b','c','d'].forEach(x => {
    document.getElementById('lo-' + x).classList.toggle('active', x === l);
  });
  render();
}

// ─────────────────────────────────────────────
//  IMAGE UPLOAD
// ─────────────────────────────────────────────
const ua = document.getElementById('uploadArea');
ua.addEventListener('dragover', e => { e.preventDefault(); ua.style.borderColor='#888'; });
ua.addEventListener('dragleave', () => { ua.style.borderColor=''; });
ua.addEventListener('drop', e => {
  e.preventDefault(); ua.style.borderColor='';
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) readImg(f);
});
function onImgSelect(e) { const f = e.target.files[0]; if (f) readImg(f); }
function readImg(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    state.img = ev.target.result;
    ua.classList.add('has-img');
    ua.innerHTML = `
      <img src="${state.img}" alt="">
      <div class="upload-overlay">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="white" stroke-width="1.5"><path d="M7 1v12M1 7l6-6 6 6"/></svg>
        更换图片
      </div>
      <input type="file" id="imgFile" accept="image/*" onchange="onImgSelect(event)" style="display:none">
    `;
    ua.onclick = () => document.getElementById('imgFile').click();
    render();
  };
  reader.readAsDataURL(file);
}

// ─────────────────────────────────────────────
//  READ FIELDS  (empty = null)
// ─────────────────────────────────────────────
const F = id => document.getElementById(id)?.value?.trim() || null;

// ─────────────────────────────────────────────
//  IMAGE BLOCK HTML
// ─────────────────────────────────────────────
function imgBlock(cls='') {
  if (state.img) return `<div class="card-img-block ${cls}"><img src="${state.img}" alt=""></div>`;
  return `<div class="card-img-block empty ${cls}">Upload Image</div>`;
}

// ─────────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────────
function render() {
  const card = document.getElementById('card');
  card.className = 'layout-' + state.layout;
  applyColors();

  const brand  = F('f-brand');
  const cat    = F('f-cat');
  const nameCn = F('f-name-cn');
  const nameEn = F('f-name-en');
  const desc   = F('f-desc');
  const size   = F('f-size');
  const price  = F('f-price');

  // watermark word: brand letters only, max 8
  const wm = (brand || '').replace(/[^A-Za-z]/g,'').toUpperCase().slice(0,8) || '·';

  const szLines = size ? size.replace(/[×xX·\s]+/g, '\n') : null;

  // ── A: Classic ──
  if (state.layout === 'a') {
    card.innerHTML = `
      <div class="la-strip">
        <div class="la-watermark">${wm}</div>
      </div>
      ${imgBlock('la-img')}
      <div class="la-bottom">
        <div class="la-cell">
          ${nameCn ? `<div class="t-name-cn-sm">${nameCn}</div>` : ''}
          ${nameEn ? `<div class="t-name-en-sm">${nameEn}</div>` : ''}
          ${cat    ? `<div class="t-cat" style="margin-top:6px">${cat}</div>` : ''}
        </div>
        <div class="la-cell">
          ${brand  ? `<div class="la-cell-label">Brand</div><div class="t-cat" style="font-size:9px;letter-spacing:.1em;color:var(--c-text-sub)">${brand}</div>` : ''}
          ${desc   ? `<div class="t-desc" style="margin-top:${brand?'8px':'0'}">${desc}</div>` : ''}
        </div>
        <div class="la-cell">
          ${price  ? `<div class="t-price-sm">${price}</div>` : ''}
          ${size   ? `<div class="t-size" style="margin-top:${price?'6px':'0'}">${szLines.replace(/\n/g,'<br>')}</div>` : ''}
        </div>
      </div>`;

  // ── B: Header ──
  } else if (state.layout === 'b') {
    card.innerHTML = `
      <div class="lb-header">
        ${brand ? `<div class="t-brand">${brand}</div>` : '<div></div>'}
        ${price ? `<div class="t-price">${price}</div>` : ''}
      </div>
      <div class="lb-body">
        ${imgBlock('lb-img')}
        <div class="lb-info">
          ${nameCn || nameEn ? `<div>
            ${nameCn ? `<div class="t-name-cn">${nameCn}</div>` : ''}
            ${nameEn ? `<div class="t-name-en">${nameEn}</div>` : ''}
          </div>` : ''}
          ${desc ? `<div>
            <div class="lb-info-label">About</div>
            <div class="t-desc">${desc}</div>
          </div>` : ''}
          ${size ? `<div>
            <div class="lb-info-label">Size</div>
            <div class="t-size">${szLines.replace(/\n/g,'<br>')}</div>
          </div>` : ''}
        </div>
      </div>
      ${cat ? `<div class="lb-footer">
        <div class="t-cat">${cat}</div>
      </div>` : ''}`;

  // ── C: Full Bleed ──
  } else if (state.layout === 'c') {
    card.innerHTML = `
      <div class="lc-img">
        ${imgBlock()}
        ${cat ? `<div class="lc-cat-tag">${cat}</div>` : ''}
      </div>
      <div class="lc-accent-line"></div>
      <div class="lc-name-row">
        <div>
          ${nameCn ? `<div class="t-name-cn">${nameCn}</div>` : ''}
          ${nameEn ? `<div class="t-name-en">${nameEn}</div>` : ''}
          ${brand  ? `<div class="t-cat" style="margin-top:6px">${brand}</div>` : ''}
        </div>
        ${price ? `<div class="t-price">${price}</div>` : ''}
      </div>
      ${desc || size ? `<div class="lc-bottom">
        ${desc ? `<div class="lc-desc-cell"><div class="t-desc">${desc}</div></div>` : ''}
        ${desc && size ? `<div class="card-divider-v"></div>` : ''}
        ${size ? `<div class="lc-size-cell">
          <div class="lc-size-label">Size</div>
          <div class="t-size">${szLines.replace(/\n/g,'<br>')}</div>
        </div>` : ''}
      </div>` : ''}`;

  // ── D: Grid ──
  } else if (state.layout === 'd') {
    // footer: collect non-null items
    const footItems = [];
    if (brand) footItems.push({ label:'Brand', val: brand, cls:'t-desc' });
    if (desc)  footItems.push({ label:'About', val: desc,  cls:'t-desc' });
    if (cat)   footItems.push({ label:'Category', val: cat, cls:'t-cat' });

    card.innerHTML = `
      <div class="ld-strip">
        <div class="ld-watermark">${wm}</div>
        <div class="ld-no">No.01</div>
      </div>
      ${imgBlock('ld-img')}
      <div class="ld-info">
        ${nameCn || nameEn ? `<div>
          ${nameCn ? `<div class="t-name-cn-sm">${nameCn}</div>` : ''}
          ${nameEn ? `<div class="t-name-en-sm">${nameEn}</div>` : ''}
        </div>` : ''}
        ${size ? `<div>
          <div class="ld-info-label">Size</div>
          <div class="t-size" style="font-size:9px">${szLines.replace(/\n/g,'<br>')}</div>
        </div>` : ''}
        ${price ? `<div style="margin-top:auto"><div class="t-price-sm">${price}</div></div>` : ''}
      </div>
      ${footItems.length ? `<div class="ld-footer">
        ${footItems.map(it=>`<div class="ld-foot-cell">
          <div class="ld-foot-label">${it.label}</div>
          <div class="${it.cls}">${it.val}</div>
        </div>`).join('')}
      </div>` : ''}`;
  }

  applyColors();
}

// ─────────────────────────────────────────────
//  EXPORT
// ─────────────────────────────────────────────
function exportCard(fmt) {
  toast('正在生成…');
  const card = document.getElementById('card');
  html2canvas(card, {
    scale: 3,
    useCORS: true,
    allowTaint: true,
    backgroundColor: state.colors.bg,
    logging: false
  }).then(canvas => {
    const a = document.createElement('a');
    const name = F('f-name-cn') || 'product-card';
    if (fmt === 'jpg') {
      a.href = canvas.toDataURL('image/jpeg', 0.95);
      a.download = name + '.jpg';
    } else {
      a.href = canvas.toDataURL('image/png');
      a.download = name + '.png';
    }
    a.click();
    toast('✓ 已导出 ' + fmt.toUpperCase());
  });
}

// ─────────────────────────────────────────────
//  UTILS
// ─────────────────────────────────────────────
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function isLight(hex) {
  const [r,g,b] = hexToComponents(hex);
  return (r*299 + g*587 + b*114) / 1000 > 145;
}

function hexToComponents(hex) {
  hex = hex.replace('#','');
  if (hex.length === 3) hex = hex.split('').map(c=>c+c).join('');
  return [parseInt(hex.slice(0,2),16), parseInt(hex.slice(2,4),16), parseInt(hex.slice(4,6),16)];
}

function hexToRgb(hex) {
  const [r,g,b] = hexToComponents(hex);
  return `rgb(${r}, ${g}, ${b})`;
}

// ─────────────────────────────────────────────
//  BOOT
// ─────────────────────────────────────────────
initSwatches();
applyColors();
render();
</script>
</body>
</html>
